<!DOCTYPE html>

    <style>
        /* Styling for the body */
        body {
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f0f0;
        }

        /* Styling for the form container */
        .form-container {
            max-width: 530px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 5px;
            background-color: #fff; /* Added background color */
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1); /* Added shadow */
        }

        /* Styling for inputs with specific IDs */
        #mileage, #email, #car-image {
            width: calc(97.5% - 20px);
            padding: 10px;
            border: 2.5px solid #ababab;
            border-radius: 4px;
            margin-right: 5px;
            font-size: 15px;
            margin-top: 15px;
        }

        /* Styling for form group containers */
        .form-group {
            margin-bottom: 15px;
        }

        /* Styling for labels within form groups */
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 17px;
        }

        /* Styling for inputs within form groups */
        .form-group input {
            width: auto;
            padding: 10px;
            border: 2.5px solid #949494;
            border-radius: 4px;
            margin-right: 5px;
            font-size: 15px;
            margin-top: 15px;
        }

        /* Styling for select dropdowns within form groups */
        .form-group select {
            width: calc(100% - 10px);
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-right: 5px;
            font-size: 15px;
        }

        /* Styling for hidden inputs */
        .form-group input.hidden {
            display: none;
        }

        /* Styling for focused or selected elements */
        .form-group select:focus,
        .form-group select.selected,
        .form-group input:focus {
            border: 2.5px solid green;
        }

        /* Styling for option boxes */
        .option-box {
            display: inline-block;
            padding: 12px 45px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin: 5px;
            cursor: pointer;
        }

        /* Styling for selected option boxes */
        .option-box.selected {
            border: 2.5px solid green;
            color: green;
            font-weight: 600;
        }

        /* Hidden class for hiding elements */
        .hidden {
            display: none;
        }

        /* Styling for submit button */
        .submit-btn {
            display: block;
            margin: 30px auto;
            width: 60%;
            padding: 10px;
            background-color: #00d058;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: background-color 0.2s ease-in-out;
        }

        /* Styling for submit button on hover */
        .submit-btn:hover {
            background-color: #32cd70;
        }

        /* Styling for submit button on active */
        .submit-btn:active {
            background-color: #034e28;
        }

        /* Styling for disabled submit button */
        .submit-btn:disabled {
            background-color: #ccc;
        }

        /* Styling for select options */
        .form-group select option {
            padding: 10px;
        }
    </style>
</head>

<script>
    // Car models data for each brand
    const carModels = {
        'Abarth': ['595', '695'],
        'Alfa Romeo': ['Giulia', 'Stelvio', 'GTV'],
        'Alpina': ['B3', 'B4'],
        'Aston Martin': ['Vantage', 'DB11', 'DBS'],
        'Audi': ['A3', 'A4', 'A5', 'A6', 'Q7'],
        // Add more car brands and their models as needed
    };

    // Car years data for each brand
    const carYears = {
        'Abarth': ['2021', '2020', '2019', '2018', '2017'],
        'Alfa Romeo': ['2021', '2020', '2019', '2018', '2017'],
        'Alpina': ['2021', '2020', '2019', '2018', '2017'],
        'Aston Martin': ['2021', '2020', '2019', '2018', '2017'],
        'Audi': ['2021', '2020', '2019', '2018', '2017'],
        // Add more car brands and their years as needed
    };

    // DOM elements for brand, model, and year selects, and "Other" input fields
    const brandSelect = document.getElementById('brand');
    const modelSelect = document.getElementById('model');
    const yearSelect = document.getElementById('year');
    const brandOtherInput = document.getElementById('brand-other');
    const modelOtherInput = document.getElementById('model-other');
    const yearOtherInput = document.getElementById('year-other');

    // Event listener for brand selection change
    brandSelect.addEventListener('change', function() {
        const brand = brandSelect.value;
        if (brand === 'Other') {
            // Show the "Other" input field for brand
            brandOtherInput.classList.remove('hidden');
            modelSelect.disabled = true;
            yearSelect.disabled = true;
        } else {
            // Hide the "Other" input field for brand and update model options
            brandOtherInput.classList.add('hidden');
            updateModelOptions(brand);
            modelSelect.disabled = false;
            yearSelect.disabled = true;
        }
    });

    // Event listener for model selection change
    modelSelect.addEventListener('change', function() {
        const model = modelSelect.value;
        if (model === 'Other') {
            // Show the "Other" input field for model
            modelOtherInput.classList.remove('hidden');
            yearSelect.disabled = true;
        } else {
            // Hide the "Other" input field for model and update year options
            modelOtherInput.classList.add('hidden');
            updateYearOptions(model);
            yearSelect.disabled = false;
        }
    });

    // Event listener for year selection change
    yearSelect.addEventListener('change', function() {
        const year = yearSelect.value;
        if (year === 'Other') {
            // Show the "Other" input field for year
            yearOtherInput.classList.remove('hidden');
        } else {
            // Hide the "Other" input field for year
            yearOtherInput.classList.add('hidden');
        }
    });

    // Function to update model options based on selected brand
    function updateModelOptions(brand) {
        modelSelect.innerHTML = '<option value="">Modell auswählen</option>';
        carModels[brand].forEach(function(model) {
            const option = document.createElement('option');
            option.value = model;
            option.textContent = model;
            modelSelect.appendChild(option);
        });
        const otherOption = document.createElement('option');
        otherOption.value = 'Other';
        otherOption.textContent = 'Andere';
        modelSelect.appendChild(otherOption);
    }

    // Function to update year options based on selected model
    function updateYearOptions(model) {
        yearSelect.innerHTML = '<option value="">Erstzulassung auswählen</option>';
        const brand = brandSelect.value;
        carYears[brand].forEach(function(year) {
            const option = document.createElement('option');
            option.value = year;
            option.textContent = year;
            yearSelect.appendChild(option);
        });
        const otherOption = document.createElement('option');
        otherOption.value = 'Other';
        otherOption.textContent = 'Andere';
        yearSelect.appendChild(otherOption);
    }

    // Event listener for form submission
    document.getElementById('car-review-form').addEventListener('submit', function(event) {
        event.preventDefault();

        // Collect form data
        const formData = {
            brand: brandSelect.value,
            brandOther: brandOtherInput.value,
            model: modelSelect.value,
            modelOther: modelOtherInput.value,
            year: yearSelect.value,
            yearOther: yearOtherInput.value,
            mileage: document.getElementById('mileage').value,
            email: document.getElementById('email').value,
            // Add more form data as needed
        };

        console.log(formData);

    });
</script>
